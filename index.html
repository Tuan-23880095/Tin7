<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        
        /* Custom Checkbox as pill buttons */
        .check-pill input:checked + div.positive { background-color: #10b981; color: white; border-color: #10b981; }
        .check-pill input:checked + div.negative { background-color: #ef4444; color: white; border-color: #ef4444; }
        .check-pill input:checked + div.neutral { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        
        .smooth-scroll { scroll-behavior: smooth; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }

        /* Tabs styling */
        .tab-btn { border-bottom: 2px solid transparent; transition: all 0.3s ease; }
        .tab-btn.active { border-bottom: 2px solid #2563eb; color: #1e3a8a; font-weight: 600; background-color: #eff6ff; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <header class="bg-blue-800 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-users-cog text-2xl"></i>
                <div>
                    <h1 class="font-bold text-lg md:text-xl">Đánh Giá Chéo Báo Cáo (BAA0008)</h1>
                    <p class="text-xs text-blue-200">Công cụ nhận xét, chấm điểm và phản biện dành cho Sinh viên</p>
                </div>
            </div>
            <button onclick="resetAll()" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2">
                <i class="fas fa-redo"></i> Đánh giá nhóm khác
            </button>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full p-4 grid grid-cols-1 lg:grid-cols-12 gap-6 relative">
        
        <div class="lg:col-span-8 space-y-6 pb-20">
            
            <div class="bg-white rounded-xl shadow-sm p-5 border border-gray-100">
                    <h2 class="font-semibold text-lg border-b pb-2 mb-4 text-gray-700">
                        <i class="fas fa-info-circle mr-2 text-blue-500"></i>Thông Tin Phiếu Đánh Giá
                    </h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-4 mb-4">
                        <div class="md:col-span-12 bg-blue-50 p-3 rounded-lg border border-blue-100">
                            <label class="block text-sm font-semibold text-blue-800 mb-1">Họ Tên / MSSV của bạn (Người đánh giá) <span class="text-red-500">*</span></label>
                            <input type="text" id="evaluatorName" placeholder="Nhập MSSV - Họ và tên của bạn..." class="w-full border rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                        </div>
                
                        <div class="md:col-span-12">
                            <label class="block text-xs font-medium text-gray-500 mb-1">Chủ đề / Đề tài nhóm báo cáo</label>
                            <textarea 
                                id="topicName" 
                                placeholder="Tên dự án..." 
                                rows="1"
                                oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px'"
                                class="w-full border rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none overflow-y-hidden min-h-[50px]"
                            ></textarea>
                        </div>
                
                        <div class="md:col-span-6">
                            <label class="block text-xs font-medium text-blue-600 mb-1 font-bold">1. Lớp học</label>
                            <select id="classSelect" class="w-full border border-blue-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-blue-50 cursor-pointer" onchange="onClassChange()">
                                <option value="">-- Chọn Lớp --</option>
                            </select>
                        </div>
                        <div class="md:col-span-6">
                            <label class="block text-xs font-medium text-blue-600 mb-1 font-bold">2. Nhóm đang báo cáo</label>
                            <select id="groupSelect" class="w-full border border-blue-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-blue-50 cursor-pointer disabled:opacity-50" onchange="onGroupChange()" disabled>
                                <option value="">-- Chọn Nhóm --</option>
                            </select>
                        </div>
                    </div>       
                <input type="hidden" id="groupName" value="">
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="flex border-b">
                    <button onclick="switchTab('groupTab')" id="btn-groupTab" class="tab-btn active flex-1 py-3 px-4 text-center text-sm text-gray-600 hover:bg-gray-50">
                        <i class="fas fa-users mr-2"></i> 1. Đánh giá Chung (Nhóm)
                    </button>
                    <button onclick="switchTab('individualTab')" id="btn-individualTab" class="tab-btn flex-1 py-3 px-4 text-center text-sm text-gray-600 hover:bg-gray-50">
                        <i class="fas fa-user-graduate mr-2"></i> 2. Đánh giá Cá Nhân (Đại diện)
                    </button>
                </div>

                <div id="groupTab" class="p-4 space-y-4">
                    <div id="criteriaContainer" class="space-y-4">
                        </div>
                </div>

                <div id="individualTab" class="p-4 hidden">
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                        <div class="flex flex-col md:flex-row md:items-center gap-3 mb-3">
                            <label class="font-semibold text-blue-800 whitespace-nowrap">3. Chọn Sinh viên đại diện:</label>
                            <select id="currentMemberName" class="flex-1 border border-blue-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none font-medium text-gray-700 bg-white shadow-sm disabled:opacity-50" disabled>
                                <option value="">-- Vui lòng chọn Nhóm ở trên trước --</option>
                            </select>

                            <button onclick="addIndividualComment()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition shadow-sm whitespace-nowrap">
                                <i class="fas fa-plus-circle mr-1"></i> Lưu nhận xét người này
                            </button>
                        </div>
                        <p class="text-xs text-blue-600"><i class="fas fa-lightbulb"></i> Đánh giá người đại diện lên báo cáo 10 phút của nhóm.</p>
                    </div>

                    <div id="individualCriteriaContainer" class="space-y-4">
                        </div>

                    <div class="mt-6 border-t pt-4">
                        <h3 class="font-semibold text-gray-700 mb-3"><i class="fas fa-clipboard-list mr-2 text-green-600"></i>Danh sách Đại diện đã nhận xét:</h3>
                        <ul id="memberList" class="space-y-2 text-sm text-gray-600">
                            <li class="italic text-gray-400">Chưa có đánh giá cá nhân nào...</li>
                        </ul>
                    </div>

                </div>
            </div>

        </div>

        <div class="lg:col-span-4 relative">
            <div class="sticky top-20 space-y-4 glass-panel rounded-xl shadow-lg border border-gray-200 p-5">
                <h2 class="font-bold text-lg text-gray-800 flex justify-between items-center border-b pb-2">
                    <span><i class="fas fa-clipboard-check mr-2 text-blue-600"></i>Chấm Điểm & Phản Biện</span>
                </h2>
                
                <div class="mt-2">
                    <label class="block text-sm font-semibold text-gray-800 mb-1"><i class="fas fa-star text-yellow-500 mr-1"></i> Điểm đánh giá (Thang 10) <span class="text-red-500">*</span></label>
                    <input type="number" id="scoreInput" min="0" max="10" step="0.25" placeholder="Ví dụ: 8.5" class="w-full border-2 border-yellow-200 rounded-lg p-2.5 text-base font-bold text-blue-800 focus:ring-2 focus:ring-yellow-500 outline-none bg-yellow-50">
                </div>

                <div class="mt-2">
                    <label class="block text-sm font-semibold text-gray-800 mb-1"><i class="fas fa-question-circle text-purple-500 mr-1"></i> Câu hỏi phản biện</label>
                    <textarea id="questionInput" rows="3" placeholder="Ghi nhận các thắc mắc hoặc câu hỏi bạn muốn hỏi nhóm báo cáo..." class="w-full border border-purple-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-purple-500 outline-none resize-none bg-purple-50"></textarea>
                </div>

                <div class="mt-4 pt-4 border-t border-gray-100 relative group">
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Bản nháp nhận xét tổng hợp:</label>
                    <textarea id="finalComment" rows="6" class="w-full border border-gray-300 rounded-lg p-2 text-xs text-gray-700 outline-none resize-none bg-gray-50 leading-relaxed font-mono" readonly placeholder="Kết quả sẽ tự động tổng hợp..."></textarea>
                </div>

                <div class="mt-4 pt-4 border-t border-gray-100">
                    <button onclick="submitToSheet()" id="btnSubmit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition shadow-md flex justify-center items-center gap-2">
                        <i class="fas fa-paper-plane"></i> GỬI KẾT QUẢ ĐÁNH GIÁ
                    </button>
                    <p id="submitStatus" class="text-xs text-center mt-2 hidden"></p>
                </div>
            </div>
        </div>
    </main>

        function parseCSV() {
            const lines = STUDENT_CSV_DATA.trim().split('\n');
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line || line.includes('(1),(2)')) continue; 
                
                const cols = line.split(',');
                if (cols.length >= 5) {
                    const mssv = cols[1].trim();
                    const hoten = cols[2].trim();
                    const topic = cols[3].trim(); 
                    const nhom = cols[4].trim(); 
                    
                    if (!nhom) continue;

                    const lop = nhom.split('-')[0]; 

                    classList.add(lop);

                    if (!groupsByClass[lop]) groupsByClass[lop] = new Set();
                    groupsByClass[lop].add(nhom);

                    if (!studentsByGroup[nhom]) studentsByGroup[nhom] = [];
                    studentsByGroup[nhom].push(`${mssv} - ${hoten}`);

                    if (topic && !topicByGroup[nhom]) {
                        topicByGroup[nhom] = topic;
                    }
                }
            }

            const classSelect = document.getElementById('classSelect');
            classSelect.innerHTML = '<option value="">-- Chọn Lớp --</option>';
            Array.from(classList).sort().forEach(lop => {
                const opt = document.createElement('option');
                opt.value = lop;
                opt.textContent = "Lớp " + lop;
                classSelect.appendChild(opt);
            });
        }

            studentSelect.innerHTML = '<option value="">-- Vui lòng chọn Nhóm ở trên trước --</option>';
            groupNameInput.value = "";
            topicInput.value = "";
            studentSelect.disabled = true;
            generateFinalText();

            if (lop) {
                groupSelect.disabled = false;
                Array.from(groupsByClass[lop]).sort().forEach(nhom => {
                    const opt = document.createElement('option');
                    opt.value = nhom;
                    opt.textContent = "Nhóm " + nhom;
                    groupSelect.appendChild(opt);
                });
            } else {
                groupSelect.disabled = true;
            }
        }

        function switchTab(tabId) {
            document.getElementById('groupTab').classList.add('hidden');
            document.getElementById('individualTab').classList.add('hidden');
            document.getElementById('btn-groupTab').classList.remove('active');
            document.getElementById('btn-individualTab').classList.remove('active');

        function renderCriteria(containerId, dataArray, onchangeFunc) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            dataArray.forEach(group => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden';
                
                const header = document.createElement('div');
                header.className = 'bg-gray-50 px-4 py-3 border-b border-gray-100 font-semibold text-gray-700 flex items-center gap-2';
                header.innerHTML = `<i class="fas ${group.icon} text-blue-500 w-5 text-center"></i> ${group.title}`;
                groupDiv.appendChild(header);

                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'p-4 flex flex-wrap gap-2';

                group.options.forEach(opt => {
                    const colorClass = opt.type === 'positive' ? 'positive text-green-700 border-green-200 bg-green-50' : 
                                       opt.type === 'negative' ? 'negative text-red-700 border-red-200 bg-red-50' : 
                                       'neutral text-blue-700 border-blue-200 bg-blue-50';
                    
                    const iconClass = opt.type === 'positive' ? 'fa-check-circle' : 
                                      opt.type === 'negative' ? 'fa-exclamation-circle' : 
                                      'fa-info-circle';

                    const lbl = document.createElement('label');
                    lbl.className = 'check-pill cursor-pointer inline-block';
                    lbl.innerHTML = `
                        <input type="checkbox" class="hidden" data-type="${opt.type}" data-text="${opt.text}" onchange="${onchangeFunc}">
                        <div class="${colorClass} border rounded-full px-3 py-1.5 text-sm font-medium transition-all hover:shadow-md flex items-center gap-1.5">
                            <i class="fas ${iconClass} opacity-70"></i>
                            ${opt.label}
                        </div>
                    `;
                    optionsGrid.appendChild(lbl);
                });

                groupDiv.appendChild(optionsGrid);
                container.appendChild(groupDiv);
            });
        }

        function addIndividualComment() {
            const nameInput = document.getElementById('currentMemberName');
            const name = nameInput.value.trim();
            
            if (!name) {
                alert("Vui lòng chọn tên Sinh viên đại diện báo cáo!");
                nameInput.focus();
                return;
            }

            const checkboxes = document.querySelectorAll('#individualTab input[type="checkbox"]:checked');
            if (checkboxes.length === 0) {
                alert("Vui lòng tick chọn ít nhất 1 tiêu chí nhận xét cho sinh viên này!");
                return;
            }

            let traits = Array.from(checkboxes).map(cb => cb.getAttribute('data-text'));
            
            if(traits.length > 0) {
                traits[0] = traits[0].charAt(0).toUpperCase() + traits[0].slice(1);
            }

            const finalString = `${traits.join(' ')}.`;
            
            evaluatedMembers.push({ name: name, comment: finalString });

            updateMemberListUI();
            generateFinalText();

            checkboxes.forEach(cb => cb.checked = false);
        }

        function removeMember(index) {
            evaluatedMembers.splice(index, 1);
            updateMemberListUI();
            generateFinalText();
        }

        function updateMemberListUI() {
            const list = document.getElementById('memberList');
            list.innerHTML = '';
            if (evaluatedMembers.length === 0) {
                list.innerHTML = '<li class="italic text-gray-400">Chưa có đánh giá cá nhân nào...</li>';
                return;
            }

            evaluatedMembers.forEach((member, index) => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-start bg-gray-50 p-2 rounded border border-gray-200";
                li.innerHTML = `
                    <div>
                        <span class="font-bold text-blue-700">${member.name}:</span> 
                        <span>${member.comment}</span>
                    </div>
                    <button onclick="removeMember(${index})" class="text-red-500 hover:text-red-700 ml-2" title="Xóa">
                        <i class="fas fa-times-circle"></i>
                    </button>
                `;
                list.appendChild(li);
            });
        }

        function generateFinalText() {
            const groupCheckboxes = document.querySelectorAll('#groupTab input[type="checkbox"]:checked');
            let positives = [];
            let negatives = [];

            groupCheckboxes.forEach(cb => {
                const type = cb.getAttribute('data-type');
                const text = cb.getAttribute('data-text');
                if (type === 'positive') positives.push(text);
                else if (type === 'negative') negatives.push(text);
            });

            const groupName = document.getElementById('groupName').value || "[Chưa chọn nhóm]";
            let result = `--- ĐÁNH GIÁ CHÉO: ${groupName.toUpperCase()} ---\n\n`;

            if (positives.length > 0 || negatives.length > 0) {
                result += `* ĐÁNH GIÁ TOÀN NHÓM:\n`;
                if (positives.length > 0) result += ` - Điểm mạnh: ${positives.join(', ')}\n`;
                if (negatives.length > 0) result += ` - Góp ý: ${negatives.join(', ')}\n`;
            }
            
            if (evaluatedMembers.length > 0) {
                result += `\n* NHẬN XÉT ĐẠI DIỆN BÁO CÁO:\n`;
                evaluatedMembers.forEach(mem => {
                    result += ` - ${mem.name.toUpperCase()}: ${mem.comment}\n`;
                });
            }

            document.getElementById('finalComment').value = result;
        }

        function resetAll() {

                document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                document.getElementById('classSelect').value = '';

                document.getElementById('groupName').value = '';
                document.getElementById('topicName').value = '';
                document.getElementById('scoreInput').value = '';
                document.getElementById('questionInput').value = '';
                
                const studentSelect = document.getElementById('currentMemberName');
                studentSelect.innerHTML = '<option value="">-- Vui lòng chọn Nhóm ở trên trước --</option>';
                studentSelect.disabled = true;

                evaluatedMembers = [];
                updateMemberListUI();
                generateFinalText();
            }
        }

        async function submitToSheet() {
            const apiUrl = GOOGLE_SCRIPT_URL;
            const evaluatorName = document.getElementById('evaluatorName').value.trim();
            const groupName = document.getElementById('groupName').value;
            const topic = document.getElementById('topicName').value;
            const score = document.getElementById('scoreInput').value;
            const question = document.getElementById('questionInput').value;
            const finalComment = document.getElementById('finalComment').value;

            if (!apiUrl || apiUrl === "DÁN_LINK_WEB_APP_CỦA_BẠN_VÀO_ĐÂY") {
                alert("Lỗi: Chưa cấu hình GOOGLE_SCRIPT_URL.");
                return;
            }
            if (!evaluatorName) {
                alert("Vui lòng nhập Họ tên / MSSV của bạn (Người đánh giá)!");
                document.getElementById('evaluatorName').focus();
                return;
            }
            if (!groupName) {
                alert("Vui lòng chọn Lớp & Nhóm đang báo cáo!");
                document.getElementById('classSelect').focus();
                return;
            }
            if (!score) {
                alert("Bạn chưa nhập Điểm số cho nhóm!");
                document.getElementById('scoreInput').focus();
                return;
            }

            const btn = document.getElementById('btnSubmit');
            const statusLabel = document.getElementById('submitStatus');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang gửi dữ liệu...';
            btn.disabled = true;
            statusLabel.className = "text-xs text-center mt-2 text-blue-600 block";
            statusLabel.innerText = "Đang kết nối tới Google Sheet...";

            // Phân tách mảng Ưu / Khuyết điểm
            const checkboxes = document.querySelectorAll('#groupTab input[type="checkbox"]:checked');
            let dsUuDiem = [];
            let dsKhuyetDiem = [];
            checkboxes.forEach(cb => {
                if(cb.getAttribute('data-type') === 'positive') dsUuDiem.push(cb.nextElementSibling.innerText.trim());
                if(cb.getAttribute('data-type') === 'negative') dsKhuyetDiem.push(cb.nextElementSibling.innerText.trim());
            });

            // Sử dụng CASE 5 (save_form_knlvn) trong GS của bạn để chèn cột tự động
            const payload = {
                action: "save_form_knlvn",
                role: topic || "Báo cáo KNLVN - Sinh viên đánh giá",
                evaluator: evaluatorName,
                groupName: groupName,
                week: "Báo cáo cuối kỳ",
                // Chèn thêm Header vào GS
                headers: ["Điểm số", "Câu hỏi phản biện", "Danh sách Ưu điểm (Đánh giá chéo)", "Danh sách Khuyết điểm (Đánh giá chéo)", "Nhận xét Tổng hợp"],
                scores: [score, question, dsUuDiem.join(", "), dsKhuyetDiem.join(", "), finalComment]
            };

            try {
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "text/plain;charset=utf-8", 
                    },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.result === "success") {
                    statusLabel.className = "text-xs text-center mt-2 text-green-600 font-bold block";
                    statusLabel.innerText = "✅ Đã nộp phiếu đánh giá thành công!";
                    setTimeout(() => statusLabel.classList.add("hidden"), 5000);
                } else {
                    throw new Error(result.error || "Lỗi không xác định từ Server");
                }
            } catch (error) {
                statusLabel.className = "text-xs text-center mt-2 text-red-600 font-bold block";
                statusLabel.innerText = "❌ Lỗi: " + error.message;
            } finally {
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> GỬI KẾT QUẢ ĐÁNH GIÁ';
                btn.disabled = false;
            }
        }

        window.onload = () => {
            parseCSV();
            renderCriteria('criteriaContainer', groupCriteriaData, 'generateFinalText()');
            renderCriteria('individualCriteriaContainer', individualCriteriaData, '');
        };
