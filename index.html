<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Tin Học 7 - Bảng Tính Điện Tử</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f0fdf4; }
        
        :root {
            --primary-color: #15803d; /* Green 700 */
            --secondary-color: #0ea5e9; /* Sky 500 */
        }

        .header-gradient { background: linear-gradient(to right, #ffffff, #dcfce7); }
        .text-primary { color: var(--primary-color); }
        .bg-primary { background-color: var(--primary-color); }
        
        /* Drag and Drop Styles */
        .draggable-item {
            cursor: grab;
            transition: all 0.2s;
            touch-action: none;
        }
        .draggable-item:active { cursor: grabbing; transform: scale(1.05); }
        .draggable-item.dragging { opacity: 0.5; }
        
        .drop-zone {
            display: inline-block;
            min-width: 100px;
            min-height: 30px;
            border-bottom: 2px dashed var(--primary-color);
            background-color: #f0fdfa;
            vertical-align: middle;
            margin: 0 5px;
            text-align: center;
            color: var(--primary-color);
            font-weight: bold;
            padding: 2px 8px;
        }
        .drop-zone.over { background-color: #bbf7d0; border-color: #166534; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #86efac; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4ade80; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="header-gradient shadow-md border-b-4 border-green-600 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between gap-4">
                <div class="flex items-center gap-4">
                    <div class="text-green-700 text-4xl"><i class="fas fa-file-excel"></i></div>
                    <div class="hidden md:block w-px h-12 bg-gray-300"></div>
                    <div>
                        <h2 class="text-xs md:text-sm font-bold text-gray-500 uppercase tracking-wide">Môn Tin Học - Lớp 7</h2>
                        <h1 class="text-lg md:text-2xl font-bold text-primary">LÀM QUEN BẢNG TÍNH</h1>
                    </div>
                </div>
                <div class="text-right">
                    <div class="flex items-center justify-end gap-2 text-xl font-bold text-orange-600 bg-white px-3 py-1 rounded shadow-sm border border-orange-200">
                        <i class="fas fa-clock"></i> <span id="timer">45:00</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-5xl mx-auto w-full p-4 pb-12">
        
        <!-- Student Info Section -->
        <div class="bg-white rounded-lg shadow-sm border border-green-200 p-6 mb-6">
            <h3 class="text-lg font-bold text-primary mb-4 border-b pb-2"><i class="fas fa-user-graduate mr-2"></i>Thông tin học sinh</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Họ và tên <span class="text-red-500">*</span></label>
                    <input type="text" id="studentName" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-green-500 outline-none" placeholder="Nhập họ tên em...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Lớp <span class="text-red-500">*</span></label>
                    <input type="text" id="className" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-green-500 outline-none" placeholder="Ví dụ: 7A1">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1 text-primary font-bold">Chọn Đề Ôn Tập <span class="text-red-500">*</span></label>
                    <select id="testSelect" onchange="changeTest()" class="w-full p-2 border-2 border-green-300 rounded focus:ring-2 focus:ring-green-500 outline-none font-bold text-green-900 bg-green-50">
                        <option value="test1">Đề số 01: Kiến thức cơ bản</option>
                        <option value="test2">Đề số 02: Thao tác với ô và khối</option>
                        <option value="test3">Đề số 03: Công thức và Hàm</option>
                        <option value="test4">Đề số 04: Giao diện và Phím tắt</option>
                        <option value="test5">Đề số 05: Tổng hợp nâng cao</option>
                    </select>
                </div>
            </div>
        </div>

        <form id="quizForm" onsubmit="return false;">
            
            <!-- Phần 1: Trắc nghiệm -->
            <div class="mb-8">
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-blue-600 text-white text-xs font-bold px-2 py-1 rounded">PHẦN 1</span>
                    <h3 class="text-xl font-bold text-gray-800">Trắc nghiệm (Chọn đáp án đúng nhất)</h3>
                </div>
                <div id="mcqContainer" class="space-y-6">
                    <!-- MCQ Items -->
                </div>
            </div>

            <!-- Phần 2: Đúng Sai -->
            <div class="mb-8">
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-orange-600 text-white text-xs font-bold px-2 py-1 rounded">PHẦN 2</span>
                    <h3 class="text-xl font-bold text-gray-800">Đúng / Sai</h3>
                </div>
                <div id="tfContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- TF Items -->
                </div>
            </div>

            <!-- Phần 3: Kéo thả -->
            <div class="mb-8">
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-purple-600 text-white text-xs font-bold px-2 py-1 rounded">PHẦN 3</span>
                    <h3 class="text-xl font-bold text-gray-800">Ghép nối (Kéo thả từ vào ô trống)</h3>
                </div>
                
                <!-- Word Bank -->
                <div class="bg-white p-4 rounded-lg shadow border border-purple-200 mb-4 sticky top-20 z-40">
                    <p class="text-sm text-gray-500 mb-2 font-medium">Kéo các thẻ sau vào ô trống thích hợp:</p>
                    <div id="wordBank" class="flex flex-wrap gap-2">
                        <!-- Draggable words -->
                    </div>
                </div>

                <div id="dragDropContainer" class="space-y-4 bg-white p-6 rounded-lg shadow-sm">
                    <!-- Sentences -->
                </div>
            </div>

            <!-- Phần 4: Trả lời ngắn -->
            <div class="mb-8">
                <div class="flex items-center gap-2 mb-4">
                    <span class="bg-yellow-600 text-white text-xs font-bold px-2 py-1 rounded">PHẦN 4</span>
                    <h3 class="text-xl font-bold text-gray-800">Trả lời ngắn</h3>
                </div>
                <div id="shortAnswerContainer" class="space-y-6">
                    <!-- Short Answer items -->
                </div>
            </div>

            <!-- Submit Actions -->
            <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-lg z-50">
                <div class="max-w-5xl mx-auto flex justify-between items-center">
                    <div class="text-sm text-gray-600 hidden md:block">
                        <span class="font-bold text-primary">Tin học 7</span> - Ôn tập học kì
                    </div>
                    <div class="flex gap-3 w-full md:w-auto">
                        <button onclick="resetQuiz()" class="px-6 py-2 border border-gray-300 rounded text-gray-600 hover:bg-gray-50 font-medium transition">
                            Làm lại
                        </button>
                        <button onclick="submitQuiz()" class="flex-1 md:flex-none px-8 py-2 bg-green-700 text-white rounded font-bold hover:bg-green-800 shadow-md transition transform hover:-translate-y-0.5">
                            <i class="fas fa-check-circle mr-2"></i> Nộp bài & Xem điểm
                        </button>
                    </div>
                </div>
            </div>
            <div class="h-16"></div> 

        </form>
    </main>

    <script>
        // --- DỮ LIỆU ĐỀ THI (5 ĐỀ) ---
        const allTests = {
            "test1": {
                // Đề 1: Cơ bản về giao diện
                mcq: [
                    { id: "mc1", q: "Hộp tên (Name Box) hiển thị gì?", options: ["Công thức", "Địa chỉ ô đang chọn", "Dung lượng tệp", "Hàm đang dùng"], correct: 1 },
                    { id: "mc2", q: "Thanh công thức dùng để làm gì?", options: ["Tạo biểu đồ", "Đổi màu chữ", "Nhập hoặc chỉnh sửa dữ liệu", "Tạo sheet mới"], correct: 2 },
                    { id: "mc3", q: "Trong Excel, ô A1 là giao của:", options: ["Cột B và hàng 2", "Cột A và hàng 1", "Cột 1 và hàng A", "Cột A và hàng A"], correct: 1 },
                    { id: "mc4", q: "Một trang tính (Sheet) bao gồm:", options: ["Các cột", "Các hàng", "Các ô", "Tất cả các ý trên"], correct: 3 },
                    { id: "mc5", q: "Phần mở rộng mặc định của tệp Excel là:", options: [".doc", ".xls", ".xlsx", ".ppt"], correct: 2 }
                ],
                tf: [
                    { id: "tf1", q: "Cột được đánh số thứ tự 1, 2, 3...", correct: false },
                    { id: "tf2", q: "Hàng được đánh số thứ tự 1, 2, 3...", correct: true },
                    { id: "tf3", q: "Một ô dữ liệu được xác định bằng giao điểm của dòng và cột.", correct: true }
                ],
                dragDrop: {
                    words: ["Cột", "Hàng", "Ô", "Địa chỉ"],
                    sentences: [
                        { id: "dd1", text: "Tập hợp các ô nằm dọc được gọi là [].", answer: "Cột" },
                        { id: "dd2", text: "Tập hợp các ô nằm ngang được gọi là [].", answer: "Hàng" },
                        { id: "dd3", text: "Giao của một hàng và một cột gọi là [].", answer: "Ô" },
                        { id: "dd4", text: "Cặp tên cột và số hàng (ví dụ B5) được gọi là [] ô.", answer: "Địa chỉ" }
                    ]
                },
                shortAns: [
                    { id: "sa1", q: "Ký tự đầu tiên cần gõ khi nhập công thức là gì?", answer: "=" }
                ]
            },
            "test2": {
                // Đề 2: Thao tác chọn và di chuyển
                mcq: [
                    { id: "mc1", q: "Để chọn toàn bộ bảng tính, nhấn tổ hợp phím:", options: ["Ctrl + B", "Ctrl + S", "Ctrl + E", "Ctrl + A"], correct: 3 },
                    { id: "mc2", q: "Để chọn các ô không liền kề, ta giữ phím:", options: ["Shift", "Ctrl", "Alt", "Tab"], correct: 1 },
                    { id: "mc3", q: "Để di chuyển con trỏ sang ô bên phải, ta nhấn phím:", options: ["Enter", "Tab", "Shift", "Esc"], correct: 1 },
                    { id: "mc4", q: "Để chọn toàn bộ cột A, ta làm gì?", options: ["Nhấn vào ô A1", "Nhấn vào chữ A trên tiêu đề cột", "Kéo chuột từ trên xuống", "Nhấn Ctrl + A"], correct: 1 },
                    { id: "mc5", q: "Khi nhấn Enter, con trỏ mặc định sẽ:", options: ["Di chuyển xuống dưới", "Di chuyển sang phải", "Đứng yên", "Xóa dữ liệu"], correct: 0 }
                ],
                tf: [
                    { id: "tf1", q: "Muốn chọn một khối ô liền kề, ta dùng phím Shift và chuột.", correct: true },
                    { id: "tf2", q: "Double-click vào ranh giới cột sẽ tự động điều chỉnh độ rộng cột theo nội dung.", correct: true },
                    { id: "tf3", q: "Thanh cuộn dùng để tính toán dữ liệu.", correct: false }
                ],
                dragDrop: {
                    words: ["Ctrl+C", "Ctrl+V", "Ctrl+X", "Ctrl+S"],
                    sentences: [
                        { id: "dd1", text: "Phím tắt dùng để sao chép là [].", answer: "Ctrl+C" },
                        { id: "dd2", text: "Phím tắt dùng để dán là [].", answer: "Ctrl+V" },
                        { id: "dd3", text: "Phím tắt dùng để cắt (di chuyển) là [].", answer: "Ctrl+X" },
                        { id: "dd4", text: "Phím tắt dùng để lưu bài là [].", answer: "Ctrl+S" }
                    ]
                },
                shortAns: [
                    { id: "sa1", q: "Phím chức năng nào giúp chỉnh sửa nội dung ngay trong ô?", answer: "F2" }
                ]
            },
            "test3": {
                // Đề 3: Dữ liệu và Công thức
                mcq: [
                    { id: "mc1", q: "Công thức =A1+B1 được nhập ở đâu?", options: ["Thanh công thức", "Trực tiếp trong ô", "Cả A và B đúng", "Không nhập được"], correct: 2 },
                    { id: "mc2", q: "Khi gõ chữ mà ô hiển thị ##### nghĩa là:", options: ["Lỗi file", "Sai công thức", "Virus", "Ô không đủ rộng để hiển thị số"], correct: 3 },
                    { id: "mc3", q: "Kiểu dữ liệu Text (văn bản) mặc định căn lề nào?", options: ["Trái", "Phải", "Giữa", "Tùy ý"], correct: 0 },
                    { id: "mc4", q: "Muốn nhập văn bản bắt đầu bằng dấu bằng, ta gõ:", options: ["==", "Space =", "'=", ".="], correct: 2 },
                    { id: "mc5", q: "Công cụ Fill Handle (nút điền) dùng để:", options: ["Xóa ô", "Sao chép công thức/dữ liệu nhanh", "Lưu file", "Đóng file"], correct: 1 }
                ],
                tf: [
                    { id: "tf1", q: "Công thức trong Excel phải luôn bắt đầu bằng dấu =.", correct: true },
                    { id: "tf2", q: "Một ô chỉ chứa được số, không chứa được chữ.", correct: false },
                    { id: "tf3", q: "Excel tự động phân biệt dữ liệu số và dữ liệu văn bản.", correct: true }
                ],
                dragDrop: {
                    words: ["Số", "Văn bản", "Công thức", "Ngày tháng"],
                    sentences: [
                        { id: "dd1", text: "Dữ liệu dùng để tính toán cộng trừ nhân chia là dữ liệu [].", answer: "Số" },
                        { id: "dd2", text: "Dữ liệu gồm các chữ cái A-Z là dữ liệu [].", answer: "Văn bản" },
                        { id: "dd3", text: "Biểu thức bắt đầu bằng dấu = gọi là [].", answer: "Công thức" },
                        { id: "dd4", text: "Dữ liệu kiểu 15/12/2023 là dữ liệu [].", answer: "Ngày tháng" }
                    ]
                },
                shortAns: [
                    { id: "sa1", q: "Để xuống dòng trong cùng một ô, ta nhấn tổ hợp phím gì?", answer: "Alt+Enter" }
                ]
            },
            "test4": {
                // Đề 4: Địa chỉ và Khối
                mcq: [
                    { id: "mc1", q: "Khối ô A1:A10 gồm bao nhiêu ô?", options: ["8", "9", "10", "11"], correct: 2 },
                    { id: "mc2", q: "Địa chỉ khối A1:C3 bao gồm bao nhiêu ô?", options: ["3", "6", "9", "12"], correct: 2 },
                    { id: "mc3", q: "Ký hiệu xác định một khối ô là dấu:", options: ["Chấm phẩy (;)", "Hai chấm (:)", "Phẩy (,)", "Cách (Space)"], correct: 1 },
                    { id: "mc4", q: "A1:D1 là khối hình gì?", options: ["Khối ngang (hàng)", "Khối dọc (cột)", "Khối chữ nhật lớn", "Khối chéo"], correct: 0 },
                    { id: "mc5", q: "Hộp tên (Name Box) có chức năng phụ là:", options: ["Xóa sheet", "Đóng Excel", "Di chuyển nhanh đến ô bằng cách nhập địa chỉ", "Vẽ hình"], correct: 2 }
                ],
                tf: [
                    { id: "tf1", q: "Khối ô A1:A10 là khối dọc.", correct: true },
                    { id: "tf2", q: "Không thể chọn nhiều khối ô cùng lúc.", correct: false },
                    { id: "tf3", q: "Địa chỉ khối được viết là Ô đầu:Ô cuối (ví dụ A1:C5).", correct: true }
                ],
                dragDrop: {
                    words: ["Khối", "Ctrl", "Shift", "NameBox"],
                    sentences: [
                        { id: "dd1", text: "Tập hợp các ô liền kề tạo thành hình chữ nhật gọi là [].", answer: "Khối" },
                        { id: "dd2", text: "Phím giữ để chọn các ô rời rạc là phím [].", answer: "Ctrl" },
                        { id: "dd3", text: "Phím giữ để chọn khối liền kề (kết hợp chuột) là phím [].", answer: "Shift" },
                        { id: "dd4", text: "Nơi hiển thị địa chỉ của khối đang chọn là [].", answer: "NameBox" }
                    ]
                },
                shortAns: [
                    { id: "sa1", q: "Tên của cột đầu tiên trong bảng tính là gì?", answer: "A" }
                ]
            },
            "test5": {
                // Đề 5: Tổng hợp nâng cao
                mcq: [
                    { id: "mc1", q: "Để chèn thêm một hàng mới, ta dùng lệnh:", options: ["Insert Row", "Insert Column", "Delete Row", "Format Cell"], correct: 0 },
                    { id: "mc2", q: "Công cụ sao chép định dạng (Format Painter) có biểu tượng hình:", options: ["Cái kéo", "Cây chổi sơn", "Đĩa mềm", "Máy in"], correct: 1 },
                    { id: "mc3", q: "Để xóa dữ liệu trong ô (nhưng không xóa ô), nhấn phím:", options: ["Delete", "Esc", "Shift", "Ctrl"], correct: 0 },
                    { id: "mc4", q: "Thanh hiển thị tên các Sheet (Trang tính) nằm ở:", options: ["Trên cùng", "Bên phải", "Dưới cùng bên trái", "Giữa màn hình"], correct: 2 },
                    { id: "mc5", q: "Khi kéo công thức, địa chỉ ô thay đổi tương ứng gọi là:", options: ["Địa chỉ tuyệt đối", "Địa chỉ tương đối", "Địa chỉ cố định", "Địa chỉ sai"], correct: 1 }
                ],
                tf: [
                    { id: "tf1", q: "Có thể đổi tên Sheet bằng cách nháy đúp chuột vào tên Sheet.", correct: true },
                    { id: "tf2", q: "Một hàng được xác định bằng chữ cái A, B, C...", correct: false },
                    { id: "tf3", q: "Hộp tên nằm bên trái thanh công thức.", correct: true }
                ],
                dragDrop: {
                    words: ["Tương đối", "Tuyệt đối", "Zoom", "Scroll"],
                    sentences: [
                        { id: "dd1", text: "Thanh trượt dùng để phóng to/thu nhỏ màn hình gọi là [].", answer: "Zoom" },
                        { id: "dd2", text: "Thanh dùng để cuộn xem dữ liệu khuất gọi là [].", answer: "Scroll" },
                        { id: "dd3", text: "Địa chỉ ô thay đổi khi sao chép công thức (ví dụ A1) là địa chỉ [].", answer: "Tương đối" },
                        { id: "dd4", text: "Địa chỉ ô cố định có dấu $ (ví dụ $A$1) là địa chỉ [].", answer: "Tuyệt đối" }
                    ]
                },
                shortAns: [
                    { id: "sa1", q: "Để hủy bỏ thao tác vừa làm (Undo), ta nhấn tổ hợp phím gì?", answer: "Ctrl+Z" }
                ]
            }
        };

        let currentQuizData = allTests["test1"];

        // --- HÀM XỬ LÝ GIAO DIỆN ---
        
        function changeTest() {
            const testId = document.getElementById('testSelect').value;
            currentQuizData = allTests[testId];
            
            // Xóa nội dung cũ
            document.getElementById('mcqContainer').innerHTML = '';
            document.getElementById('tfContainer').innerHTML = '';
            document.getElementById('wordBank').innerHTML = '';
            document.getElementById('dragDropContainer').innerHTML = '';
            document.getElementById('shortAnswerContainer').innerHTML = '';

            draggedItem = null;
            initQuiz();
        }

        function initQuiz() {
            renderMCQ();
            renderTF();
            renderDragDrop();
            renderShortAnswer();
        }

        function renderMCQ() {
            const container = document.getElementById('mcqContainer');
            currentQuizData.mcq.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-lg shadow-sm border border-gray-100 hover:shadow-md transition";
                div.innerHTML = `
                    <p class="font-bold text-gray-800 mb-3"><span class="text-blue-600">Câu ${index + 1}:</span> ${item.q}</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${item.options.map((opt, i) => `
                            <label class="flex items-start p-3 border rounded cursor-pointer hover:bg-green-50 transition">
                                <input type="radio" name="${item.id}" value="${i}" class="mt-1 mr-3 text-green-600 focus:ring-green-500">
                                <span class="text-sm text-gray-700">${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderTF() {
            const container = document.getElementById('tfContainer');
            currentQuizData.tf.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-lg shadow-sm border border-gray-100";
                div.innerHTML = `
                    <p class="font-bold text-gray-800 mb-3 text-sm"><span class="text-orange-600">Câu ${index + 1}:</span> ${item.q}</p>
                    <div class="flex gap-6">
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" name="${item.id}" value="true" class="text-green-600 focus:ring-green-500">
                            <span class="font-bold text-green-700">Đúng</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" name="${item.id}" value="false" class="text-red-600 focus:ring-red-500">
                            <span class="font-bold text-red-700">Sai</span>
                        </label>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderDragDrop() {
            const wordBank = document.getElementById('wordBank');
            const shuffledWords = [...currentQuizData.dragDrop.words].sort(() => Math.random() - 0.5);
            
            shuffledWords.forEach(word => {
                const el = document.createElement('div');
                el.className = 'draggable-item bg-purple-100 text-purple-800 px-4 py-2 rounded-full font-bold shadow-sm border border-purple-300 select-none';
                el.draggable = true;
                el.innerText = word;
                el.id = 'word-' + word.replace(/\s+/g, '-');
                
                el.addEventListener('dragstart', dragStart);
                el.addEventListener('dragend', dragEnd);
                el.addEventListener('touchstart', touchStart, {passive: false});
                el.addEventListener('touchmove', touchMove, {passive: false});
                el.addEventListener('touchend', touchEnd);
                
                wordBank.appendChild(el);
            });

            const container = document.getElementById('dragDropContainer');
            currentQuizData.dragDrop.sentences.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "p-3 border-b border-gray-100 last:border-0";
                const htmlText = item.text.replace('[]', `<span class="drop-zone" data-correct="${item.answer}" id="drop-${item.id}"></span>`);
                div.innerHTML = `<span class="font-bold text-purple-600 mr-2">Câu ${index + 1}:</span> ${htmlText}`;
                container.appendChild(div);
            });

            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.addEventListener('dragover', dragOver);
                zone.addEventListener('dragenter', dragEnter);
                zone.addEventListener('dragleave', dragLeave);
                zone.addEventListener('drop', drop);
            });
        }

        function renderShortAnswer() {
            const container = document.getElementById('shortAnswerContainer');
            currentQuizData.shortAns.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-lg shadow-sm border border-gray-100";
                div.innerHTML = `
                    <p class="font-bold text-gray-800 mb-2"><span class="text-yellow-600">Câu ${index + 1}:</span> ${item.q}</p>
                    <input type="text" id="${item.id}" class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-yellow-500 outline-none text-sm" placeholder="Nhập câu trả lời...">
                `;
                container.appendChild(div);
            });
        }

        // --- XỬ LÝ KÉO THẢ (HỖ TRỢ MOBILE) ---
        let draggedItem = null;
        let touchItem = null;
        let touchOffsetX = 0;
        let touchOffsetY = 0;

        function dragStart(e) {
            draggedItem = this;
            setTimeout(() => this.classList.add('dragging'), 0);
        }
        function dragEnd() {
            this.classList.remove('dragging');
            draggedItem = null;
        }
        function dragOver(e) { e.preventDefault(); }
        function dragEnter(e) { e.preventDefault(); this.classList.add('over'); }
        function dragLeave() { this.classList.remove('over'); }
        
        function drop(e) {
            this.classList.remove('over');
            if (draggedItem) {
                if (this.innerText) {
                    returnToBank(this.innerText);
                }
                this.innerText = draggedItem.innerText;
                this.dataset.val = draggedItem.innerText;
                draggedItem.style.display = 'none';
            }
        }

        function touchStart(e) {
            e.preventDefault();
            touchItem = this;
            const touch = e.touches[0];
            const rect = this.getBoundingClientRect();
            touchOffsetX = touch.clientX - rect.left;
            touchOffsetY = touch.clientY - rect.top;
            
            this.style.position = 'fixed';
            this.style.left = rect.left + 'px';
            this.style.top = rect.top + 'px';
            this.style.zIndex = 1000;
            this.style.opacity = 0.8;
        }

        function touchMove(e) {
            e.preventDefault();
            if (!touchItem) return;
            const touch = e.touches[0];
            touchItem.style.left = (touch.clientX - touchOffsetX) + 'px';
            touchItem.style.top = (touch.clientY - touchOffsetY) + 'px';
        }

        function touchEnd(e) {
            if (!touchItem) return;
            touchItem.style.opacity = 1;
            touchItem.style.zIndex = '';
            
            const changedTouch = e.changedTouches[0];
            const elemBelow = document.elementFromPoint(changedTouch.clientX, changedTouch.clientY);
            const dropZone = elemBelow ? elemBelow.closest('.drop-zone') : null;

            if (dropZone) {
                if (dropZone.innerText) returnToBank(dropZone.innerText);
                dropZone.innerText = touchItem.innerText;
                dropZone.dataset.val = touchItem.innerText;
                touchItem.style.display = 'none';
            }
            
            touchItem.style.position = '';
            touchItem = null;
        }

        function returnToBank(text) {
            const id = 'word-' + text.replace(/\s+/g, '-');
            const wordEl = document.getElementById(id);
            if(wordEl) {
                wordEl.style.display = 'inline-block';
                wordEl.style.position = '';
            }
        }

        // --- NỘP BÀI VÀ CHẤM ĐIỂM ---

        function submitQuiz() {
            const name = document.getElementById('studentName').value.trim();
            const className = document.getElementById('className').value.trim();
            
            if (!name || !className) {
                alert("Vui lòng nhập Họ tên và Lớp trước khi nộp bài!");
                window.scrollTo(0,0);
                return;
            }

            if (!confirm(`Nộp bài cho học sinh ${name} - Lớp ${className}?`)) return;

            let score = 0;
            let totalQuestions = 0;

            // 1. Chấm Trắc nghiệm (Mỗi câu 2 điểm)
            currentQuizData.mcq.forEach(q => {
                totalQuestions++;
                const selected = document.querySelector(`input[name="${q.id}"]:checked`);
                const val = selected ? parseInt(selected.value) : -1;
                
                // Highlight kết quả
                const inputs = document.querySelectorAll(`input[name="${q.id}"]`);
                inputs.forEach((input, idx) => {
                    const parent = input.parentElement;
                    if (idx === q.correct) parent.classList.add('bg-green-200', 'border-green-500');
                    else if (input.checked && idx !== q.correct) parent.classList.add('bg-red-200', 'border-red-500');
                });

                if (val === q.correct) score += 2;
            });

            // 2. Chấm Đúng Sai (Mỗi câu 2 điểm)
            currentQuizData.tf.forEach(q => {
                totalQuestions++;
                const selected = document.querySelector(`input[name="${q.id}"]:checked`);
                const val = selected ? (selected.value === 'true') : null;
                
                // Highlight
                const inputs = document.querySelectorAll(`input[name="${q.id}"]`);
                if(selected) {
                    if(val === q.correct) selected.parentElement.classList.add('bg-green-200', 'p-1', 'rounded');
                    else selected.parentElement.classList.add('bg-red-200', 'p-1', 'rounded');
                }

                if (val === q.correct) score += 2;
            });

            // 3. Chấm Kéo thả (Mỗi câu 2.5 điểm)
            document.querySelectorAll('.drop-zone').forEach(zone => {
                totalQuestions++;
                const userVal = zone.innerText.trim();
                const correctVal = zone.dataset.correct;
                if (userVal === correctVal) {
                    score += 2.5;
                    zone.style.backgroundColor = '#bbf7d0'; // Green
                    zone.style.borderColor = '#166534';
                } else {
                    zone.style.backgroundColor = '#fecaca'; // Red
                    zone.style.borderColor = '#b91c1c';
                }
            });

            // 4. Chấm Trả lời ngắn (Mỗi câu 2.5 điểm - Tương đối)
            currentQuizData.shortAns.forEach(q => {
                totalQuestions++;
                const input = document.getElementById(q.id);
                const val = input.value.trim().toLowerCase().replace(/\s/g, ''); // Xóa khoảng trắng để so sánh
                const answer = q.answer.toLowerCase().replace(/\s/g, '');
                
                if (val === answer) {
                    score += 2.5;
                    input.classList.add('border-green-500', 'bg-green-50');
                } else {
                    input.classList.add('border-red-500', 'bg-red-50');
                    // Hiển thị đáp án đúng
                    const hint = document.createElement('div');
                    hint.className = "text-red-600 text-sm mt-1 font-bold";
                    hint.innerText = `Đáp án đúng: ${q.answer}`;
                    input.parentNode.appendChild(hint);
                }
            });

            // Quy đổi về thang điểm 10
            // Tổng điểm thô tối đa = (5*2) + (3*2) + (4*2.5) + (1*2.5) = 10 + 6 + 10 + 2.5 = 28.5 (Tuỳ đề)
            // Để đơn giản, hiển thị điểm thô hoặc tính %
            
            // Tính lại max score của đề hiện tại
            const maxScore = (currentQuizData.mcq.length * 2) + 
                             (currentQuizData.tf.length * 2) + 
                             (currentQuizData.dragDrop.sentences.length * 2.5) + 
                             (currentQuizData.shortAns.length * 2.5);
            
            const finalScore10 = (score / maxScore) * 10;

            alert(`KẾT QUẢ BÀI LÀM\n\nHọc sinh: ${name}\nĐiểm số: ${finalScore10.toFixed(1)} / 10`);
            
            // Disable inputs
            document.querySelectorAll('input, button, select, .draggable-item').forEach(el => el.disabled = true);
            document.querySelectorAll('.draggable-item').forEach(el => el.draggable = false);
        }

        function resetQuiz() {
            if(confirm("Làm lại sẽ xóa hết các lựa chọn hiện tại. Bạn có chắc không?")) {
                document.getElementById('quizForm').reset();
                document.querySelectorAll('.drop-zone').forEach(z => {
                    if(z.innerText) returnToBank(z.innerText);
                    z.innerText = '';
                    z.style.backgroundColor = '';
                    z.style.borderColor = '';
                });
                // Xóa highlight đáp án sai ở phần trả lời ngắn
                document.querySelectorAll('#shortAnswerContainer div.text-red-600').forEach(e => e.remove());
                document.querySelectorAll('#shortAnswerContainer input').forEach(e => e.classList.remove('border-green-500', 'bg-green-50', 'border-red-500', 'bg-red-50'));

                changeTest(); // Re-render
                window.scrollTo(0,0);
            }
        }

        function startTimer() {
            let duration = 45 * 60; 
            const display = document.getElementById('timer');
            const timer = setInterval(() => {
                const minutes = Math.floor(duration / 60);
                const seconds = duration % 60;
                display.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                if (--duration < 0) {
                    clearInterval(timer);
                    alert("Hết giờ làm bài!");
                    submitQuiz();
                }
            }, 1000);
        }

        window.onload = () => {
            initQuiz();
            startTimer();
        };

    </script>
</body>
